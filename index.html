<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Clicker App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🎮 Clicker Game</h1>
            <p id="username">Cargando...</p>
        </header>

        <main>
            <div class="click-section">
                <div class="counter">
                    <span id="click-count">0</span>
                    <p>Clicks</p>
                </div>
                
                <button id="click-btn" class="click-button">
                    <span>👆</span>
                    <p>CLICK</p>
                </button>
            </div>

            <button id="leaderboard-btn" class="secondary-button">
                🏆 Leaderboard
            </button>

            <div id="ad-banner" class="ad-banner">
                <button id="watch-ad-btn" class="ad-button">
                    📺 Watch Ad
                </button>
                <div id="ad-container"></div>
            </div>
        </main>

        <div id="loading" class="loading active">
            <div class="spinner"></div>
            <p>Conectando con Telegram...</p>
        </div>

        <!-- Leaderboard Modal -->
        <div id="leaderboard-modal" class="modal">
            <div class="modal-content">
                <div class="modal-header">
                    <h2>🏆 Top 10</h2>
                    <button id="close-modal" class="close-btn">&times;</button>
                </div>
                <div id="leaderboard-list" class="leaderboard-list">
                    <div class="loading">Cargando...</div>
                </div>
            </div>
        </div>
    </div>

    <!-- Telega.io SDK -->
    <script src="https://inapp.telega.io/sdk/v1/sdk.js"></script>
    <script>
        const ads = window.TelegaIn.AdsController.create_miniapp({
            token: 'eb3c4a8e-4014-493d-bc16-5752cfca4edf'
        });
    </script>

    <!-- Módulo ES: permite usar @supabase/supabase-js por URL (esm.sh) e importar ./config.js -->
    <script type="module" src="app.js"></script>
</body>
</html>
